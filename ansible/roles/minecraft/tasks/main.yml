---
 - name: Ensure Minecraft deployment directory exists
   ansible.builtin.file:
     path: "{{ minecraft_compose_dir }}"
     state: directory
     owner: root
     group: root
     mode: "0755"

 - name: Deploy Minecraft compose file
   ansible.builtin.template:
     src: docker-compose.yml.j2
     dest: "{{ minecraft_compose_dir }}/docker-compose.yml"
     owner: root
     group: root
     mode: "0644"

 - name: Ensure Minecraft Compose file is running
   community.docker.docker_compose_v2:
     project_src: "{{ minecraft_compose_dir }}"
     state: present

 - name: Ensure the Minecraft data directory exists
   ansible.builtin.file:
     path: "{{ minecraft_data_dir }}"
     state: directory
     owner: root
     group: root
     mode: "0755"
